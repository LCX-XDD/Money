<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- ✅ 核心：全局禁止缩放和双击放大 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>LCX的工资</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <!-- 主窗口 -->
<div class="white-window">
  <h1 class="title">LCX</h1>
  
<!-- 顶部 周期进度 卡片 -->
<div class="progress-window top-progress-window">
  <h3 class="progress-label">抓🐷进度</h3>
  <!-- 新增 id="top-progress" -->
  <div class="progress-circle mini-progress" id="top-progress">
    <div class="progress-text" id="cycle-progress-text">0%</div>
  </div>
</div>
  
  <!-- 蓝色总工资卡片 -->
  <div class="total-wage-box">
    <div class="loading-overlay"><div class="loading-spinner"></div></div>
    <button class="refresh-btn" id="refresh-data-btn">↻</button>
    <div class="cycle-text" id="current-cycle">2026-05-26~2026-06-25</div>
    <div class="total-wage-label">悬赏金</div>
    <div class="total-wage-value" id="total-wage-num">0.00</div>
    <button class="btn-detail" id="detail-btn">查看详细信息</button>
  </div>

<!-- 下方 抓捕进度 卡片 -->
<div class="progress-window">
  <h3 class="progress-label">悬赏💰进度</h3>
  <!-- 新增 id="bottom-progress" -->
  <div class="progress-circle" id="bottom-progress">
    <div class="progress-text" id="progress-text">0%</div>
  </div>
</div>
</div>

  <!-- 管理员页面内容 -->
  <div id="admin-calendar" class="hidden">
    <!-- 原有日历和表单内容不变 -->
  </div>
</div>

  <!-- ✅ 隐藏用户页面日历（添加hidden类） -->
  <div class="calendar-wrap hidden">
    <div class="calendar-head">
      <button id="prev-month-btn">&lt;</button>
      <span id="calendar-title">2026-05-26~2026-06-25</span>
      <button id="next-month-btn">&gt;</button>
    </div>
    <div class="calendar-week">
      <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
    </div>
    <div class="calendar-body" id="calendar-body"></div>
  </div>
</div>

    <!-- 管理员页面：不显示总工资，只显示日历+表单+列表 -->
    <div id="admin-view" class="hidden">
      <!-- 管理员页面日历 -->
      <div class="calendar-wrap">
        <div class="calendar-head">
          <button id="admin-prev-month-btn">&lt;</button>
          <span id="admin-calendar-title">2026-05-26~2026-06-25</span>
          <button id="admin-next-month-btn">&gt;</button>
        </div>
        <div class="calendar-week">
          <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
        </div>
        <div class="calendar-body" id="admin-calendar-body"></div>
      </div>

      <!-- 记录表单 -->
      <input type="date" id="record-date" class="form-input">
      <select id="record-shift" class="form-input">
        <option value="">请选择班次</option>
        <option value="早班">早班</option>
        <option value="中班">中班</option>
        <option value="晚班">晚班</option>
        <option value="拼班">拼班</option>
        <option value="休息">休息</option>
      </select>

      <div id="normal-time-row" class="time-row hidden">
        <label>上班时间：</label>
        <select id="shift-start" class="time-select"></select>
      </div>
      <div id="normal-end-row" class="time-row hidden">
        <label>下班时间：</label>
        <select id="shift-end" class="time-select"></select>
      </div>
      <div id="part2-start-row" class="time-row hidden">
        <label>第二段上班：</label>
        <select id="shift-start2" class="time-select"></select>
      </div>
      <div id="part2-end-row" class="time-row hidden">
        <label>第二段下班：</label>
        <select id="shift-end2" class="time-select"></select>
      </div>
      <div id="meal-wrap" class="time-row hidden">
        <label>饭点开始：</label>
        <select id="meal-start" class="time-select"></select>
      </div>

      <div class="time-tip" id="work-hours-tip">有效工时：0 小时</div>
      <input type="text" id="record-money" class="form-input" placeholder="当日基本工资（自动计算）" readonly>
      <input type="text" id="record-allowance" class="form-input" placeholder="加班补贴（自动）">
      <input type="text" id="record-remark" class="form-input" placeholder="备注信息">
      <input type="hidden" id="edit-id">

      <button id="save-btn" class="btn-primary">保存记录</button>
      <div class="btn-back">
        <button id="back-user">返回用户页</button>
      </div>

      <!-- 管理列表 -->
      <h3 class="sub-title">管理列表</h3>
      <div class="list" id="admin-list"></div>
    </div>
  </div>

  <!-- 管理员入口（右下角） -->
  <div id="admin-entrance" class="admin-entrance">LCX</div>

  <!-- 登录弹窗 -->
  <div id="login-overlay" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-content">
        <div class="modal-title">管理员登录</div>
        <input type="password" id="admin-pwd-input" class="modal-input" placeholder="请输入管理员密码">
        <div class="modal-btn-group">
          <button id="login-cancel" class="modal-btn cancel">取消</button>
          <button id="login-confirm" class="modal-btn confirm">确认</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 详情弹窗 -->
  <div id="detail-overlay" class="modal-overlay">
    <div class="modal-box detail-modal">
      <div class="modal-content">
        <div class="modal-title">本期详情</div>
        <div class="detail-item">
          <span>总工时</span>
          <span id="stat-work-hours">0 小时</span>
        </div>
        <div class="detail-item">
          <span>出勤天数</span>
          <span id="stat-work-days">0 天</span>
        </div>
        <div class="detail-item">
          <span>21点下班</span>
          <span id="stat-21h-days">0 天</span>
        </div>
        <div class="detail-item">
          <span>22点下班</span>
          <span id="stat-22h-days">0 天</span>
        </div>
        <div class="detail-item">
          <span>23点下班</span>
          <span id="stat-23h-days">0 天</span>
        </div>
        <div class="detail-item">
          <span>总基本工资</span>
          <span id="stat-base-money">¥0.00</span>
        </div>
        <div class="detail-item">
          <span>总加班补贴</span>
          <span id="stat-allowance">¥0.00</span>
        </div>
        <div class="detail-list-title">历史周期</div>
        <div id="cycle-group-list"></div>
        <div style="text-align:center;padding:16px;">
          <button id="detail-close" class="btn-primary" style="width:80%;">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 周期详情弹窗 -->
  <div id="cycle-detail-overlay" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-content">
        <div class="modal-title" id="cycle-detail-title"></div>
        <div id="cycle-detail-record-list"></div>
        <div style="text-align:center;padding:16px;">
          <button id="cycle-detail-close" class="btn-primary" style="width:80%;">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 周期工资统计弹窗 -->
  <div id="cycle-total-overlay" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-content">
        <div class="modal-title" id="cycle-total-title"></div>
        <div style="padding:20px;text-align:center;" id="cycle-total-info"></div>
        <div style="text-align:center;padding:16px;">
          <button id="cycle-total-close" class="btn-primary" style="width:80%;">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast提示（保持顶部显示） -->
  <div id="toast" class="toast"></div>

  <!-- LeanCloud SDK -->
  <script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4.15.0/dist/av-min.js"></script>
  <script src="./js/script.js"></script>
</body>
</html>
